<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BirdBuddy — Stats</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; color: #e0e0e0; font-family: system-ui, sans-serif; }
    header {
      background: #111; padding: 10px 20px; display: flex; align-items: center;
      gap: 12px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; flex: 1; }
    .back-btn {
      background: none; border: 1px solid #444; color: #aaa; border-radius: 5px;
      padding: 4px 10px; font-size: 0.8rem; cursor: pointer; text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .back-btn:hover { border-color: #aaa; color: #fff; }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      padding: 20px;
    }
    .card {
      background: #222; border-radius: 8px; padding: 16px; text-align: center;
    }
    .card .val { font-size: 2rem; font-weight: 700; color: #4caf50; }
    .card .label { font-size: 0.75rem; color: #888; margin-top: 4px; }

    .section { padding: 0 20px 24px; }
    .section h2 { font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: #555; margin-bottom: 14px; }

    .chart-wrap { background: #222; border-radius: 8px; padding: 16px; }

    .species-table { width: 100%; border-collapse: collapse; }
    .species-table th { text-align: left; font-size: 0.72rem; color: #666;
      font-weight: 600; text-transform: uppercase; padding: 6px 8px; }
    .species-table td { padding: 8px; border-top: 1px solid #2a2a2a; font-size: 0.85rem; }
    .species-table td:last-child { text-align: right; color: #4caf50; font-weight: 600; }
    .bar { height: 6px; background: #4caf50; border-radius: 3px; margin-top: 4px; }

    .disk-bar-wrap { background: #333; border-radius: 4px; height: 8px; margin-top: 8px; overflow: hidden; }
    .disk-bar { height: 100%; background: #4caf50; border-radius: 4px; transition: width 0.4s; }
    .disk-bar.warn { background: #ff9800; }
    .disk-bar.danger { background: #f44336; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="back-btn">← Live</a>
    <h1>Statistics</h1>
  </header>

  <div class="summary-cards" id="summaryCards">
    <div class="card"><div class="val" id="totalSightings">—</div><div class="label">Total sightings</div></div>
    <div class="card"><div class="val" id="uniqueSpecies">—</div><div class="label">Species seen</div></div>
    <div class="card"><div class="val" id="todaySightings">—</div><div class="label">Today</div></div>
    <div class="card"><div class="val" id="totalCaptures">—</div><div class="label">Captures</div></div>
    <div class="card"><div class="val" id="visitsToday">—</div><div class="label">Visits today</div></div>
    <div class="card"><div class="val" id="avgVisit">—</div><div class="label">Avg visit</div></div>
    <div class="card" id="diskCard">
      <div class="val" id="diskFree">—</div>
      <div class="label">GB free</div>
      <div class="disk-bar-wrap"><div class="disk-bar" id="diskBar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="section">
    <h2>Activity by hour</h2>
    <div class="chart-wrap" style="height:200px">
      <canvas id="hourChart"></canvas>
    </div>
  </div>

  <div class="section">
    <h2>Activity by day (last 30 days)</h2>
    <div class="chart-wrap" style="height:180px">
      <canvas id="dayChart"></canvas>
    </div>
  </div>

  <div class="section">
    <h2>Recent visits</h2>
    <div class="chart-wrap">
      <table class="species-table">
        <thead><tr><th>When</th><th>Species</th><th>Detections</th><th>Duration</th></tr></thead>
        <tbody id="visitsTable"></tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <h2>Top species</h2>
    <div class="chart-wrap">
      <table class="species-table">
        <thead><tr><th>Species</th><th>Count</th></tr></thead>
        <tbody id="speciesTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    const chartDefaults = {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#2a2a2a' } },
        y: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#2a2a2a' }, beginAtZero: true },
      }
    };

    function fmtDur(secs) {
      if (!secs) return '0s';
      if (secs < 60) return secs + 's';
      return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
    }

    async function load() {
      const [stats, disk, visits] = await Promise.all([
        fetch('/api/stats').then(r => r.json()),
        fetch('/api/disk').then(r => r.json()),
        fetch('/api/visits').then(r => r.json()),
      ]);

      document.getElementById('totalSightings').textContent = stats.total_sightings;
      document.getElementById('uniqueSpecies').textContent = stats.unique_species;
      document.getElementById('todaySightings').textContent = stats.today_sightings;
      document.getElementById('totalCaptures').textContent = stats.total_captures;
      document.getElementById('visitsToday').textContent = stats.visits_today;
      document.getElementById('avgVisit').textContent = fmtDur(stats.avg_visit_secs);

      document.getElementById('visitsTable').innerHTML = visits.slice(0, 15).map(v => `
        <tr>
          <td>${v.start.slice(5, 16)}</td>
          <td>${v.species.split(' ').slice(-2).join(' ')}</td>
          <td>${v.detections}</td>
          <td>${fmtDur(v.duration_secs)}</td>
        </tr>
      `).join('') || '<tr><td colspan="4" style="color:#555">No visits yet</td></tr>';

      document.getElementById('diskFree').textContent = disk.free_gb;
      const bar = document.getElementById('diskBar');
      bar.style.width = disk.used_pct + '%';
      if (disk.used_pct > 90) bar.classList.add('danger');
      else if (disk.used_pct > 75) bar.classList.add('warn');

      // Hour chart
      new Chart(document.getElementById('hourChart'), {
        type: 'bar',
        data: {
          labels: Array.from({length: 24}, (_, i) => i + 'h'),
          datasets: [{ data: stats.by_hour, backgroundColor: '#4caf50aa', borderColor: '#4caf50', borderWidth: 1 }]
        },
        options: chartDefaults,
      });

      // Day chart
      new Chart(document.getElementById('dayChart'), {
        type: 'line',
        data: {
          labels: stats.by_day.map(d => d.date.slice(5)),
          datasets: [{ data: stats.by_day.map(d => d.count),
            borderColor: '#4caf50', backgroundColor: '#4caf5022',
            fill: true, tension: 0.3, pointRadius: 3 }]
        },
        options: chartDefaults,
      });

      // Species table
      const max = stats.top_species[0]?.count || 1;
      document.getElementById('speciesTable').innerHTML = stats.top_species.map(s => `
        <tr>
          <td>
            ${s.species}
            <div class="bar" style="width:${Math.round(s.count/max*100)}%"></div>
          </td>
          <td>${s.count}</td>
        </tr>
      `).join('');
    }

    load();
  </script>
</body>
</html>
