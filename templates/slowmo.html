<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BirdBuddy — Slow-Mo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; color: #e0e0e0; font-family: system-ui, sans-serif; }

    header {
      background: #111;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; flex: 1; }
    .back-btn {
      background: none;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .back-btn:hover { border-color: #aaa; color: #fff; }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #555;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .card {
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #333;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #4caf50; }

    .card video {
      width: 100%;
      aspect-ratio: 16/9;
      background: #111;
      display: block;
    }

    .card-info {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-info .label {
      font-size: 0.8rem;
      color: #4caf50;
      font-weight: 600;
    }
    .card-info .meta {
      font-size: 0.72rem;
      color: #666;
    }
    .card-info a {
      font-size: 0.72rem;
      color: #555;
      text-decoration: none;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 8px;
      transition: all 0.15s;
    }
    .card-info a:hover { color: #fff; border-color: #aaa; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="back-btn">← Live</a>
    <h1>Hummingbird Slow-Mo</h1>
    <span id="count" style="font-size:0.75rem;color:#555"></span>
  </header>

  <div id="content"></div>

  <script>
    function formatTs(ts) {
      // "20260629_113538" → "Jun 29 11:35:38"
      const y = ts.slice(0,4), mo = ts.slice(4,6), d = ts.slice(6,8);
      const h = ts.slice(9,11), mi = ts.slice(11,13), s = ts.slice(13,15);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[parseInt(mo)-1]} ${parseInt(d)}, ${h}:${mi}:${s}`;
    }

    fetch('/slowmo').then(r => r.json()).then(videos => {
      const content = document.getElementById('content');
      if (!videos.length) {
        content.innerHTML = '<div class="empty">No slow-mo videos yet.<br>They\'re captured automatically when a hummingbird is detected.</div>';
        return;
      }
      document.getElementById('count').textContent = `${videos.length} video${videos.length !== 1 ? 's' : ''}`;
      content.innerHTML = `<div class="grid">${videos.map(v => `
        <div class="card">
          <video src="/slowmo/${v.filename}" controls preload="metadata" playsinline></video>
          <div class="card-info">
            <div>
              <div class="label">🐦 Hummingbird</div>
              <div class="meta">${formatTs(v.timestamp)}</div>
            </div>
            <div style="text-align:right">
              <div class="meta" style="margin-bottom:4px">${v.size_mb} MB</div>
              <a href="/slowmo/${v.filename}" download>⬇ Download</a>
            </div>
          </div>
        </div>
      `).join('')}</div>`;
    });
  </script>
</body>
</html>
